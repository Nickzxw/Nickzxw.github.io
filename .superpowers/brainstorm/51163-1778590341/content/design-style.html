<h2>产品式博客 — 设计风格</h2>
<p class="subtitle">选择你喜欢的视觉方向</p>

<div class="cards">
  <div class="card" data-choice="minimal" onclick="toggleSelect(this)">
    <div class="card-image">
      <div class="mockup">
        <div class="mockup-body" style="padding:20px;font-family:system-ui">
          <div style="width:60px;height:60px;background:#000;border-radius:12px;margin-bottom:20px"></div>
          <div style="height:8px;background:#e5e5e5;border-radius:4px;margin-bottom:8px;width:70%"></div>
          <div style="height:8px;background:#f0f0f0;border-radius:4px;margin-bottom:8px;width:90%"></div>
          <div style="height:8px;background:#f0f0f0;border-radius:4px;margin-bottom:20px;width:60%"></div>
          <div style="display:flex;gap:12px;margin-top:24px">
            <div style="width:80px;height:32px;background:#000;border-radius:8px"></div>
            <div style="width:80px;height:32px;background:#f5f5f5;border-radius:8px"></div>
          </div>
        </div>
      </div>
    </div>
    <div class="card-body">
      <h3>简约卡片式</h3>
      <p>大量留白，卡片承载内容，微妙的悬浮动效，阅读体验优先</p>
    </div>
  </div>

  <div class="card" data-choice="feature" onclick="toggleSelect(this)">
    <div class="card-image">
      <div class="mockup">
        <div class="mockup-body" style="padding:20px;font-family:system-ui">
          <div style="display:flex;align-items:center;margin-bottom:20px">
            <div style="width:40px;height:40px;background:linear-gradient(135deg,#667eea,#764ba2);border-radius:10px;margin-right:12px"></div>
            <div>
              <div style="height:10px;background:#222;border-radius:3px;width:100px;margin-bottom:6px"></div>
              <div style="height:6px;background:#ccc;border-radius:3px;width:60px"></div>
            </div>
          </div>
          <div style="height:120px;background:linear-gradient(135deg,#f8f9fa,#e9ecef);border-radius:12px;border:1px solid #e9ecef">
            <div style="padding:20px;text-align:center;color:#999;font-size:12px">Featured Article</div>
          </div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:12px">
            <div style="height:80px;background:#f8f9fa;border-radius:8px"></div>
            <div style="height:80px;background:#f8f9fa;border-radius:8px"></div>
          </div>
        </div>
      </div>
    </div>
    <div class="card-body">
      <h3>大图+精选</h3>
      <p>顶部大图 banner，精选文章突出展示，图文交错，内容层次分明</p>
    </div>
  </div>

  <div class="card" data-choice="immersive" onclick="toggleSelect(this)">
    <div class="card-image">
      <div class="mockup">
        <div class="mockup-body" style="padding:20px;font-family:system-ui;background:#1a1a2e;color:#fff">
          <div style="display:flex;justify-content:space-between;margin-bottom:24px">
            <div style="width:40px;height:40px;background:linear-gradient(135deg,#667eea,#764ba2);border-radius:8px"></div>
            <div style="display:flex;gap:20px">
              <div style="width:40px;height:12px;background:#555;border-radius:3px"></div>
              <div style="width:40px;height:12px;background:#555;border-radius:3px"></div>
              <div style="width:40px;height:12px;background:#555;border-radius:3px"></div>
            </div>
          </div>
          <div style="margin-top:40px">
            <div style="height:6px;background:#667eea;border-radius:3px;width:50%;margin-bottom:12px"></div>
            <div style="height:20px;background:#fff;border-radius:4px;width:80%;margin-bottom:16px"></div>
            <div style="height:6px;background:#444;border-radius:3px;width:60%"></div>
          </div>
          <div style="margin-top:32px;display:flex;gap:10px">
            <div style="width:100px;height:36px;background:linear-gradient(135deg,#667eea,#764ba2);border-radius:18px"></div>
            <div style="width:100px;height:36px;background:#333;border-radius:18px"></div>
          </div>
        </div>
      </div>
    </div>
    <div class="card-body">
      <h3>沉浸深色</h3>
      <p>深色主题，渐变色点缀，沉浸式阅读体验，适合技术/极客内容</p>
    </div>
  </div>
</div>

<div class="section" style="margin-top:32px">
  <p style="color:#666;font-size:14px">点击选择你喜欢的设计方向</p>
</div>
